name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o playground-server .

      - name: Test health endpoint
        run: |
          ./playground-server -addr :8090 &
          sleep 2
          curl -sf http://localhost:8090/api/health | grep '"ok"'
          kill %1
